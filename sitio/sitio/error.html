<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Página no encontrada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#0d0d0d; --text:#f0ede6; --accent:#e8ff47; --muted:#555; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .code {
      font-family: 'Space Mono', monospace;
      font-size: clamp(5rem, 18vw, 12rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      opacity: .15;
      position: absolute;
      user-select: none;
    }
    .content { position: relative; z-index: 1; }
    h1 { font-family: 'Space Mono', monospace; font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: var(--accent); color: #000;
      padding: .75rem 2rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="content">
    <h1>Página no encontrada</h1>
    <p>La ruta que buscas no existe en este sitio.</p>
    <a href="index.html">← Volver al inicio</a>
  </div>
</body>
</html>
